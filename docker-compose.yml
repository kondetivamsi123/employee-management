version: "3.9"

services:
  frontend:
    image: nginx
    container_name: frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "5000:5000"

  database:
    image: postgres
    container_name: database
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: employee
    ports:
      - "5432:5432"
    volumes:
      - employee-data:/var/lib/postgresql

volumes:
  employee-data:
